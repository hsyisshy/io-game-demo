<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<title>.io 多人連線 Demo</title>
<style>
  /* 簡單置中版面，畫布加個邊框方便看到世界邊界 */
  html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    background: #1e1e1e;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-family: sans-serif;
    color: #eee;
  }
  #status {
    margin-bottom: 8px;
    height: 20px;
  }
  #gameArea {
    position: relative;
  }
  canvas {
    background: #2a2a2a;
    border: 2px solid #555;
    display: block;
  }
  /* 右上角排行榜，用一般 DOM 疊在 canvas 上面，不用另外畫在畫布裡 */
  #leaderboard {
    position: absolute;
    top: 8px;
    right: 8px;
    min-width: 140px;
    background: rgba(0, 0, 0, 0.5);
    border-radius: 6px;
    padding: 8px 12px;
    font-size: 13px;
  }
  #leaderboard h3 {
    margin: 0 0 6px;
    font-size: 13px;
    color: #ffd54f;
  }
  #leaderboard ol {
    margin: 0;
    padding-left: 18px;
  }
  #leaderboard li.me {
    color: #ffd54f;
    font-weight: bold;
  }
</style>
</head>
<body>

  <div id="status">連線中...</div>
  <div id="gameArea">
    <canvas id="gameCanvas"></canvas>
    <div id="leaderboard">
      <h3>排行榜（依質量）</h3>
      <ol id="leaderboardList"></ol>
    </div>
  </div>

  <script>
    // ------------------------------------------------------------
    // 前端邏輯：
    // 1. 建立 WebSocket 連線
    // 2. 監聽鍵盤事件，記錄「目前」按鍵狀態，並持續回報給伺服器
    // 3. 接收伺服器廣播的所有玩家座標，用 requestAnimationFrame 畫出來
    //
    // 注意：前端完全不自己計算移動座標，座標永遠以伺服器廣播的為準，
    // 這就是「伺服器主導 (Authoritative Server)」的精神。
    // ------------------------------------------------------------

    const statusEl = document.getElementById('status');
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const leaderboardListEl = document.getElementById('leaderboardList');

    // 預設畫布大小，等收到伺服器的 init 訊息後會用伺服器的世界大小覆蓋
    canvas.width = 800;
    canvas.height = 600;

    let myPlayerId = null;   // 我自己的 player id（伺服器分配）
    let latestPlayers = [];  // 最新一次從伺服器收到的所有玩家狀態（含 x, y, color, radius, mass）
    let latestFood = [];     // 最新一次從伺服器收到的所有食物狀態

    let eatenMessageUntil = 0; // 「你被吃掉了」提示要顯示到什麼時間點（用 Date.now() 比對）

    // ---- 建立 WebSocket 連線 ----
    // 自動組出 ws:// 或 wss:// + 目前網址的 host（同一台伺服器、同一個 port）
    const protocol = location.protocol === 'https:' ? 'wss:' : 'ws:';
    const ws = new WebSocket(`${protocol}//${location.host}`);

    ws.addEventListener('open', () => {
      statusEl.textContent = '已連線，等待伺服器分配角色...';
    });

    ws.addEventListener('close', () => {
      statusEl.textContent = '連線已中斷，請重新整理頁面';
    });

    ws.addEventListener('error', () => {
      statusEl.textContent = '連線發生錯誤';
    });

    ws.addEventListener('message', (event) => {
      const msg = JSON.parse(event.data);

      if (msg.type === 'init') {
        // 伺服器告訴我：我的 id 是誰、世界大小是多少
        myPlayerId = msg.id;
        canvas.width = msg.world.width;
        canvas.height = msg.world.height;
      } else if (msg.type === 'state') {
        // 伺服器廣播的最新狀態：所有玩家與食物的 x / y / color / radius
        latestPlayers = msg.players;
        latestFood = msg.food;
        updateStatusText();
        updateLeaderboard(msg.leaderboard);
      } else if (msg.type === 'eaten') {
        // 我被別人吃掉了，短暫顯示提示文字
        eatenMessageUntil = Date.now() + 2000;
      }
    });

    // 依照目前自己的質量更新狀態列文字；若剛被吃掉，改顯示提示訊息
    function updateStatusText() {
      if (Date.now() < eatenMessageUntil) {
        statusEl.textContent = '你被吃掉了！重新開始長大吧';
        return;
      }
      const me = latestPlayers.find((p) => p.id === myPlayerId);
      if (me) {
        statusEl.textContent = `你是玩家 #${myPlayerId} ｜ 質量：${me.mass}（用 WASD 或方向鍵移動，吃食物長大，體型比你小 15% 以上的玩家可以吃掉他們）`;
      }
    }

    // 依照伺服器送來的排行榜資料，更新畫面右上角的排行榜列表
    function updateLeaderboard(leaderboard) {
      if (!leaderboard) return;
      leaderboardListEl.innerHTML = '';
      for (const entry of leaderboard) {
        const li = document.createElement('li');
        li.textContent = `#${entry.id}（${entry.mass}）`;
        if (entry.id === myPlayerId) li.className = 'me';
        leaderboardListEl.appendChild(li);
      }
    }

    // ------------------------------------------------------------
    // 鍵盤輸入：只記錄「目前哪些鍵被按著」，實際移動邏輯完全在伺服器端
    // ------------------------------------------------------------
    const input = { up: false, down: false, left: false, right: false };

    // 支援 WASD 與方向鍵兩種按法
    const KEY_MAP = {
      'KeyW': 'up',    'ArrowUp': 'up',
      'KeyS': 'down',  'ArrowDown': 'down',
      'KeyA': 'left',  'ArrowLeft': 'left',
      'KeyD': 'right', 'ArrowRight': 'right',
    };

    let inputChanged = false;

    window.addEventListener('keydown', (e) => {
      const dir = KEY_MAP[e.code];
      if (dir && !input[dir]) {
        input[dir] = true;
        inputChanged = true;
      }
    });

    window.addEventListener('keyup', (e) => {
      const dir = KEY_MAP[e.code];
      if (dir && input[dir]) {
        input[dir] = false;
        inputChanged = true;
      }
    });

    // 每次按鍵狀態改變時，立刻把最新狀態傳給伺服器
    // （伺服器會用固定 tick rate 讀取這個狀態來計算座標，
    //  這裡用「狀態改變才送」而不是「每個 requestAnimationFrame 都送」，可以省頻寬）
    function sendInputIfChanged() {
      if (inputChanged && ws.readyState === WebSocket.OPEN) {
        ws.send(JSON.stringify({ type: 'input', ...input }));
        inputChanged = false;
      }
    }
    setInterval(sendInputIfChanged, 1000 / 30); // 最多每秒送 30 次

    // ------------------------------------------------------------
    // 畫面渲染：用 requestAnimationFrame 持續清除畫布並重繪所有玩家
    // ------------------------------------------------------------
    function render() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      // 先畫食物（小圓點），畫在底層，玩家會疊在食物上面
      for (const f of latestFood) {
        ctx.beginPath();
        ctx.arc(f.x, f.y, f.radius, 0, Math.PI * 2);
        ctx.fillStyle = f.color;
        ctx.fill();
      }

      // 再畫玩家（圓形，大小依照伺服器算出的 radius）
      for (const p of latestPlayers) {
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
        ctx.fillStyle = p.color;
        ctx.fill();

        // 把自己的圓加上白色外框，方便在畫面上一眼認出自己
        if (p.id === myPlayerId) {
          ctx.strokeStyle = '#fff';
          ctx.lineWidth = 2;
          ctx.stroke();
        }

        // 在圓心標示目前質量，方便玩家判斷誰比較大
        ctx.fillStyle = '#fff';
        ctx.font = '12px sans-serif';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(p.mass, p.x, p.y);
      }

      requestAnimationFrame(render);
    }
    requestAnimationFrame(render);
  </script>

</body>
</html>
